<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<div class="container">
  <h2>Registration</h2>

  <div class="section-title">Personal Details</div>
  <div class="form-grid">
    <input id="username" type="text" placeholder="Username" required>
    <input id="password" type="password" placeholder="Password" required>
    <input id="fullname" type="text" placeholder="Full Name" required>
    <input id="dob" type="date" required>
    <input id="email" type="email" placeholder="Email" required>
    <input id="mobile" type="text" placeholder="Mobile Number" required>
    <select id="gender" required>
      <option value="">Gender</option>
      <option>Male</option>
      <option>Female</option>
    </select>
    <input id="occupation" type="text" placeholder="Occupation" required>
  </div>

  <div class="section-title">Identity Details</div>
  <div class="form-grid">
    <input id="idType" type="text" placeholder="ID Type" required>
    <input id="idNumber" type="text" placeholder="ID Number" required>
    <input id="issueAuthority" type="text" placeholder="Issue Authority" required>
    <input id="issueDate" type="date" required>
    <input id="issueState" type="text" placeholder="Issue State" required>
    <input id="expiryDate" type="date" required>
  </div>

  <button id="registerBtn" type="button">Sign Up</button>
  <p id="message"></p>
  <a href="login.html">Already have an account? Login</a>
</div>

<script type="module">
import { register } from "../controller/authController.js";

document.getElementById("registerBtn").addEventListener("click", () => {
  register({
    username: document.getElementById("username").value,
    password: document.getElementById("password").value,
    fullname: document.getElementById("fullname").value,
    dob: document.getElementById("dob").value,
    email: document.getElementById("email").value,
    mobile: document.getElementById("mobile").value,
    gender: document.getElementById("gender").value,
    occupation: document.getElementById("occupation").value,
    idType: document.getElementById("idType").value,
    idNumber: document.getElementById("idNumber").value,
    issueAuthority: document.getElementById("issueAuthority").value,
    issueDate: document.getElementById("issueDate").value,
    issueState: document.getElementById("issueState").value,
    expiryDate: document.getElementById("expiryDate").value
  });
});
</script>

</body>
</html>
