<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="../assets/style.css">
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #4e73df, #1cc88a);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  width: 350px;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  color: #4e73df;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  margin-top: 15px;
  padding: 10px;
  width: 100%;
  background-color: #4e73df;
  color: white;
  border: none;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background-color: #2e59d9;
}

a {
  display: block;
  text-align: center;
  margin-top: 10px;
  text-decoration: none;
  color: #4e73df;
}

#message {
  margin-top: 10px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h2>Login</h2>
  <input id="username" type="text" placeholder="Username" required>
  <input id="password" type="password" placeholder="Password" required>
  <button id="loginBtn" type="button">Login</button>

  <p id="message"></p>
  <a href="register.html">Don't have an account? Register</a>
</div>

<script type="module">
// Simple simulated login with sessionStorage
const loginBtn = document.getElementById("loginBtn");

loginBtn.addEventListener("click", () => {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  // Check if the user exists in localStorage
  const storedUser = JSON.parse(localStorage.getItem(username));

  if (!storedUser) {
    document.getElementById("message").innerText = "❌ User not found";
    return;
  }

  if (storedUser.password !== password) {
    document.getElementById("message").innerText = "❌ Wrong password";
    return;
  }

  // Store session in sessionStorage
  sessionStorage.setItem("currentUser", JSON.stringify(storedUser));

  document.getElementById("message").innerText = `✅ Welcome ${storedUser.fullname}`;
});

// Optional: check if user is already logged in
const currentUser = JSON.parse(sessionStorage.getItem("currentUser"));
if (currentUser) {
  document.getElementById("message").innerText = `✅ Already logged in as ${currentUser.fullname}`;
}
</script>

</body>
</html>
